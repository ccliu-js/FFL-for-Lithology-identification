common:
  paths:
    data: ./dataset/dataset.pkl
    weights: ./weights/best_model.pth
  runtime:
    device: auto
    seed: 42
  data:
    speed: r400
    axis: Acc_Z
  slicing:
    slice_len: 512
    overlap: 0.0
    drop_last: true
  split:
    ratio: 0.8

model:
  proto_net:
    scale: 15.0
  encoder:
    time:
      input_channels: 1
      num_filters: 32
      depth: 3
      kernel_size: 15
      residual: true
      bottleneck: true
      use_global_pool: false
    stft:
      n_fft: 64
      hop_length: 16
      win_length: 64
      spec_height: 128
      spec_width: 128
      log_eps: 0.00000001
    frequency:
      input_channels: 1
      channels_1: 16
      channels_2: 32
      channels_3: 64
      groups_1: 4
      groups_2: 8
      groups_3: 8
    fusion:
      channel_reduction: 8
      min_channel_hidden: 4
      temporal_kernel_size: 7
      hidden_dim: 8
      beta_init: 0.1
    embedding:
      latent_dim: 128
      embed_dim: 128

train:
  data:
    delete_class: null
  episodes:
    train:
      n_way: 7
      k_shot: 4
      q_shot: 3
    test:
      n_way: 7
      k_shot: 10
      q_shot: 10
  optimization:
    num_epochs: 20
    episodes_per_epoch: 40
    learning_rate: 0.0003
    weight_decay: 0.0001
    scheduler:
      factor: 0.5
      patience: 10
      min_lr: 0.000001

infer_multi:
  experiment:
    repeat: 23
    n_way: 7
    k_shot: 10
    query_size: 200
    monte_carlo_samples: 5
    plot: true
    figure_k_label: 7

test_diff_speed:
  episodes:
    train:
      n_way: 0
      k_shot: 0
      q_shot: 0
    test:
      n_way: 7
      k_shot: 10
      q_shot: 90
  evaluation:
    n_way: 7
    num_episodes: 10
